<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23222'/%3E%3C/svg%3E" />
    <title>Text-to-Sculpture Generator Workbench Host</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0f172a;
      }

      generator-workbench,
      #workbench {
        display: block;
        width: 100%;
        height: 100%;
        background: #f6f6fa;
      }

      #workbench-status {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: transparent;
        color: #334155;
        font: 500 14px/1.5 sans-serif;
        letter-spacing: 0.01em;
      }

      #workbench-status::before {
        content: "";
        width: 18px;
        height: 18px;
        border: 2px solid rgba(51, 65, 85, 0.2);
        border-top-color: #334155;
        border-radius: 999px;
        animation: workbench-status-spin 0.8s linear infinite;
      }

      #workbench-status[data-state="error"]::before {
        display: none;
      }

      @keyframes workbench-status-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script src="https://static-res.atomm.com/scripts/js/generator-sdk/index.umd.js"></script>
    <script type="module">
      import { loadSculptureConfig } from './src/runtime/configBootstrap.js'
      import { resolveSculpturePageMode } from './src/runtime/page-mode.js'

      async function hydrateEmbedEntry(global) {
        const params = new URLSearchParams(global.location.search)
        const target = params.get('target') || 'full'
        const bootstrap = await loadSculptureConfig(global)
        const appKey = params.get('appKey') || bootstrap.appKey || 'dev_sculpture'
        const env = params.get('env') || bootstrap.env || 'prod'

        global.__SCULPTURE_PAGE_MODE__ = 'embed'
        global.__SCULPTURE_PAGE_TARGET__ = target
        global.ATOMM_GENERATOR_APP_KEY = appKey
        global.ATOMM_GENERATOR_ENV = env

        const response = await fetch('./app.html', { cache: 'no-store' })
        if (!response.ok) {
          throw new Error('Failed to load app.html: HTTP ' + response.status)
        }

        const html = await response.text()
        const bootstrapScript = '<script>' +
          'window.__SCULPTURE_PAGE_MODE__=' + JSON.stringify('embed') + ';' +
          'window.__SCULPTURE_PAGE_TARGET__=' + JSON.stringify(target) + ';' +
          'window.ATOMM_GENERATOR_APP_KEY=' + JSON.stringify(appKey) + ';' +
          'window.ATOMM_GENERATOR_ENV=' + JSON.stringify(env) + ';' +
          '<' + '/script>'
        const nextHtml = /<\/head>/i.test(html)
          ? html.replace(/<\/head>/i, bootstrapScript + '\n</head>')
          : bootstrapScript + html

        document.open()
        document.write(nextHtml)
        document.close()
      }

      try {
        if (resolveSculpturePageMode({ globalObject: window }) === 'embed') {
          await hydrateEmbedEntry(window)
        } else {
          const bootstrap = await loadSculptureConfig(window)
          window.ATOMM_GENERATOR_APP_KEY = bootstrap.appKey
          window.ATOMM_GENERATOR_ENV = bootstrap.env
          await import('./src/pages/full.js')
        }
      } catch (error) {
        console.error('[sculpture index] bootstrap failed', error)
        const statusNode = document.getElementById('workbench-status')
        if (statusNode) {
          statusNode.dataset.state = 'error'
          statusNode.textContent = String(error)
        }
      }
    </script>
  </head>
  <body>
    <generator-workbench id="workbench"></generator-workbench>
    <div id="workbench-status">Loading...</div>
  </body>
</html>
